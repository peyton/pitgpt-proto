name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: hk run pre-commit --all

  check:
    name: Check (lint + GHA)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: hk run check --all

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: uv sync --python 3.12
      - run: uv run --python 3.12 pytest

  web:
    name: Web Build And Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: npm --prefix web ci
      - run: npm --prefix web run build
      - run: npm --prefix web run test:unit
      - run: npm --prefix web run test:e2e:install
      - run: npm --prefix web run test:e2e
      - run: npm --prefix web audit

  rust:
    name: Rust Tauri Checks
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --manifest-path app/Cargo.toml -- --check
      - run: cargo clippy --manifest-path app/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path app/Cargo.toml --all-targets

  tauri-macos-build:
    name: macOS Tauri Build
    runs-on: macos-14
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    environment: apple-signing
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
      APPLE_API_KEY_PATH: private_keys/AuthKey.p8
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CI: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Check Apple signing secrets
        id: signing
        run: scripts/apple-release-preflight.sh macos-dmg --github-output-availability
      - if: steps.signing.outputs.available == 'true'
        run: npm --prefix web ci
      - name: Write App Store Connect API key
        if: steps.signing.outputs.available == 'true'
        run: scripts/apple-release-preflight.sh macos-dmg --write-files
      - if: steps.signing.outputs.available == 'true'
        run: npm --prefix web run tauri:build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.signing.outputs.available == 'true'
        with:
          name: pitgpt-macos-${{ github.sha }}
          path: |
            app/target/release/bundle/dmg/*.dmg
            app/target/release/bundle/macos/*.app
          if-no-files-found: error

  ios-simulator:
    name: iOS Simulator Build
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: npm --prefix web ci
      - run: rustup target add aarch64-apple-ios-sim
      - run: npm --prefix web run tauri -- ios init --ci
      - run: scripts/tauri-ios-npm-shim.sh
      - run: npm --prefix web run tauri -- ios build --debug --target aarch64-sim --ci

  audit:
    name: Dependency Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: uv sync --python 3.12
      - run: uv pip check --python 3.12
      - run: npm --prefix web ci
      - run: npm --prefix web audit
