name: macOS Preview Release

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/macos-preview-release.yml"
      - "src-tauri/**"
      - "web/**"
      - "shared/**"
      - "justfile"
      - "mise.toml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-preview-release
  cancel-in-progress: true

jobs:
  preview:
    name: Build And Publish macOS Preview
    runs-on: macos-14
    environment: apple-signing
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
      APPLE_API_KEY_PATH: private_keys/AuthKey.p8
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CI: "true"
      GH_TOKEN: ${{ github.token }}
      PREVIEW_TAG: macos-preview
      PREVIEW_TITLE: macOS Preview
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: npm --prefix web ci
      - name: Validate Apple signing secrets
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_P8_B64 APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing Apple signing secret::$name is required for the macOS preview release"
              missing=1
            fi
          done
          exit "$missing"
      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$APPLE_API_KEY_PATH")"
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 -d > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
      - run: npm --prefix web run tauri:build
      - name: Collect macOS artifacts
        id: artifacts
        run: |
          set -euo pipefail
          artifacts_file="$RUNNER_TEMP/macos-preview-artifacts.txt"
          find src-tauri/target/release/bundle -type f -name '*.dmg' -print | sort > "$artifacts_file"
          if [ ! -s "$artifacts_file" ]; then
            echo "::error title=Missing macOS artifact::No DMG was produced"
            exit 1
          fi
          echo "file=$artifacts_file" >> "$GITHUB_OUTPUT"
      - name: Publish preview release
        env:
          ARTIFACTS_FILE: ${{ steps.artifacts.outputs.file }}
        run: |
          set -euo pipefail
          release_notes="$RUNNER_TEMP/macos-preview-notes.md"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          cat > "$release_notes" <<NOTES
          Automated macOS preview build from master.

          Commit: ${GITHUB_SHA}
          Run: ${run_url}

          This release is replaced whenever macOS app inputs change on master.
          NOTES

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${PREVIEW_TAG}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${PREVIEW_TAG}" \
              -f sha="$GITHUB_SHA" \
              -F force=true >/dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${PREVIEW_TAG}" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          if gh release view "$PREVIEW_TAG" >/dev/null 2>&1; then
            gh release edit "$PREVIEW_TAG" \
              --target "$GITHUB_SHA" \
              --title "$PREVIEW_TITLE" \
              --notes-file "$release_notes" \
              --prerelease
          else
            gh release create "$PREVIEW_TAG" \
              --target "$GITHUB_SHA" \
              --title "$PREVIEW_TITLE" \
              --notes-file "$release_notes" \
              --prerelease \
              --latest=false
          fi

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${PREVIEW_TAG}" --jq '.id')"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --paginate --jq '.[].id' | while IFS= read -r asset_id; do
            if [ -n "$asset_id" ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
            fi
          done

          artifacts=()
          while IFS= read -r artifact; do
            artifacts+=("$artifact")
          done < "$ARTIFACTS_FILE"

          gh release upload "$PREVIEW_TAG" "${artifacts[@]}" --clobber
