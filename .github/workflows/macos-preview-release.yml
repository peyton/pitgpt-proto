name: macOS Preview Release

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/macos-preview-release.yml"
      - "src-tauri/**"
      - "web/**"
      - "shared/**"
      - "justfile"
      - "mise.toml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-preview-release
  cancel-in-progress: true

jobs:
  preview:
    name: Build And Publish macOS Preview
    runs-on: macos-14
    timeout-minutes: 45
    environment: apple-signing
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
      APPLE_API_KEY_PATH: private_keys/AuthKey.p8
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CI: "true"
      GH_TOKEN: ${{ github.token }}
      PREVIEW_TAG: macos-preview
      PREVIEW_TITLE: macOS Preview
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: npm --prefix web ci
      - name: Prepare Apple signing files
        run: scripts/apple-release-preflight.sh macos-dmg --write-files
      - run: npm --prefix web run tauri:build
      - name: Collect macOS artifacts
        id: artifacts
        run: |
          set -euo pipefail
          artifacts_file="$RUNNER_TEMP/macos-preview-artifacts.txt"
          scripts/collect-tauri-artifacts.sh macos-dmg "$artifacts_file"
          echo "file=$artifacts_file" >> "$GITHUB_OUTPUT"
      - name: Publish preview release
        env:
          ARTIFACTS_FILE: ${{ steps.artifacts.outputs.file }}
        run: scripts/publish-macos-preview.sh
