name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  macos:
    name: Signed macOS Artifacts
    runs-on: macos-14
    timeout-minutes: 45
    if: github.event.release.tag_name != 'macos-preview'
    environment: apple-signing
    permissions:
      contents: write
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_API_KEY_PATH: private_keys/AuthKey.p8
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CI: "true"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: npm --prefix web ci
      - name: Prepare Apple signing files
        run: scripts/apple-release-preflight.sh macos-dmg --write-files
      - run: npm --prefix web run tauri:build
      - name: Attach macOS artifacts
        run: |
          set -euo pipefail
          artifacts_file="$RUNNER_TEMP/macos-artifacts.txt"
          scripts/collect-tauri-artifacts.sh macos-dmg "$artifacts_file"
          while IFS= read -r artifact; do
            gh release upload "$GITHUB_REF_NAME" "$artifact" --clobber
          done < "$artifacts_file"

  ios:
    name: Signed iOS IPA
    runs-on: macos-15
    timeout-minutes: 60
    if: github.event.release.tag_name != 'macos-preview'
    environment: apple-signing
    permissions:
      contents: write
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_API_KEY_PATH: private_keys/AuthKey.p8
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
      CI: "true"
      GH_TOKEN: ${{ github.token }}
      TAURI_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: npm --prefix web ci
      - run: rustup target add aarch64-apple-ios
      - name: Prepare Apple signing files
        run: scripts/apple-release-preflight.sh ios-appstore --write-files
      - run: npm --prefix web run tauri -- ios init --ci
      - run: scripts/tauri-ios-npm-shim.sh
      - run: npm --prefix web run tauri -- ios build --target aarch64 --export-method app-store-connect --build-number "$TAURI_BUILD_NUMBER" --ci
      - name: Attach iOS IPA
        run: |
          set -euo pipefail
          artifacts_file="$RUNNER_TEMP/ios-artifacts.txt"
          scripts/collect-tauri-artifacts.sh ios-ipa "$artifacts_file"
          while IFS= read -r artifact; do
            gh release upload "$GITHUB_REF_NAME" "$artifact" --clobber
          done < "$artifacts_file"
